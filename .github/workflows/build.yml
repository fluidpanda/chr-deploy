name: build

on:
  workflow_dispatch:
  schedule:
    # check for new RouterOS releases every day at 06:00 UTC
    - cron: '0 6 * * *'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: Check for new version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_build: ${{ steps.version.outputs.should_build }}
      dns_resolved: ${{ steps.dns.outputs.resolved }}
    steps:
      - name: Get latest RouterOS stable version
        id: version
        run: |
          VERSION=$(curl -fsSL https://upgrade.mikrotik.com/routeros/NEWESTa7.stable | awk '{print $1}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # check if a release for this version already exists
          HTTP=$(curl -o /dev/null -s -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$VERSION")

          if [[ "$HTTP" == "200" ]]; then
            echo "Release $VERSION already exists, skipping build."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version: $VERSION"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check DNS resolution
        id: dns
        run: |
          RESOLVED=false
          for i in 1 2 3 4 5; do
            if getent hosts download.mikrotik.com >/dev/null 2>&1; then
              RESOLVED=true
              break
            fi
            echo "download.mikrotik.com did not resolve (attempt $i/5), retrying in 10s..."
            sleep 10
          done
          echo "resolved=$RESOLVED" >> "$GITHUB_OUTPUT"
          if [[ "$RESOLVED" == "false" ]]; then
            echo "::warning::download.mikrotik.com could not be resolved after 5 attempts. Skipping this run — the next scheduled run will retry."
          fi

  build:
    name: Build ${{ needs.check.outputs.version }}
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.should_build == 'true' && needs.check.outputs.dns_resolved == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y qemu-utils rsync unzip gdisk

      - name: Load nbd module
        run: sudo modprobe nbd max_part=16

      - name: Download CHR image
        env:
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          curl -4 -fL \
            --connect-timeout 30 \
            --retry 5 \
            --retry-delay 10 \
            -o chr.img.zip \
            "https://download.mikrotik.com/routeros/$VERSION/chr-$VERSION.img.zip"
          unzip -q chr.img.zip
          rm chr.img.zip

      - name: Convert to qcow2
        run: |
          qemu-img convert -f raw -O qcow2 chr-*.img chr-bios.qcow2
          cp chr-bios.qcow2 chr-efi.qcow2
          rm chr-*.img

      - name: Connect NBD devices
        run: |
          sudo qemu-nbd -c /dev/nbd0 chr-bios.qcow2
          sudo qemu-nbd -c /dev/nbd1 chr-efi.qcow2
          sleep 1
          sudo partprobe /dev/nbd0
          sudo partprobe /dev/nbd1
          sleep 1

      - name: Patch EFI boot partition
        run: |
          sudo mkfs.fat /dev/nbd1p1
          sudo mkdir -p /tmp/chr-bios /tmp/chr-efi
          sudo mount /dev/nbd0p1 /tmp/chr-bios
          sudo mount /dev/nbd1p1 /tmp/chr-efi
          sudo rsync -a /tmp/chr-bios/ /tmp/chr-efi/
          sudo umount /dev/nbd0p1
          sudo umount /dev/nbd1p1

      - name: Disconnect NBD devices
        run: |
          sudo qemu-nbd -d /dev/nbd0
          sudo qemu-nbd -d /dev/nbd1

      - name: Convert to raw and fix GPT
        env:
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          qemu-img convert -f qcow2 -O raw chr-efi.qcow2 chr-efi.img
          rm chr-bios.qcow2 chr-efi.qcow2

          zip "chr-efi-$VERSION.img.zip" chr-efi.img
          rm chr-efi.img

      - name: Create git tag
        env:
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.check.outputs.version }}
          name: ${{ needs.check.outputs.version }}
          allowUpdates: false
          artifacts: chr-efi-${{ needs.check.outputs.version }}.img.zip
          body: |
            MikroTik RouterOS CHR ${{ needs.check.outputs.version }} — EFI image

            Converted from the official CHR image:
            - First partition reformatted from ext2 to FAT for UEFI boot
            - GPT backup header relocated to end of image

            **Install:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/chr-deploy.sh \
              | bash -s -- /dev/vda
            ```
